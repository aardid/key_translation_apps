<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key Translations - Translation Dictionary</title>
<style>
  :root {
    --primary: #1a3a5c;
    --primary-light: #2a5a8c;
    --accent: #e8b931;
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #333333;
    --text-light: #666666;
    --border: #dde3ea;
    --highlight: #fff3cd;
    --success: #28a745;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    padding: 20px 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    color: var(--primary);
    flex-shrink: 0;
  }

  .logo-text h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .logo-text p {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 1px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-accent {
    background: var(--accent);
    color: var(--primary);
  }

  .btn-accent:hover { background: #d4a620; }

  .btn-outline {
    background: transparent;
    color: white;
    border: 1.5px solid rgba(255,255,255,0.4);
  }

  .btn-outline:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.7);
  }

  .btn-web {
    background: #e9ecef;
    color: var(--text);
  }

  .btn-web:hover { background: #dde1e5; }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
  }

  .search-section {
    background: var(--card);
    border-radius: 12px;
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }

  .search-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .search-input-wrap {
    flex: 1;
    position: relative;
  }

  .search-input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: #999;
  }

  #searchInput {
    width: 100%;
    padding: 14px 14px 14px 42px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
    transition: border-color 0.2s;
    outline: none;
  }

  #searchInput:focus { border-color: var(--primary-light); }

  #searchInput::placeholder { color: #aaa; }

  .filters-row {
    display: flex;
    gap: 16px;
    margin-top: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-light);
  }

  .filter-group select {
    padding: 6px 10px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: white;
    cursor: pointer;
    outline: none;
  }

  .filter-group select:focus { border-color: var(--primary-light); }

  .stats {
    margin-left: auto;
    font-size: 13px;
    color: var(--text-light);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stats strong { color: var(--primary); }

  .web-search-bar {
    background: var(--card);
    border-radius: 12px;
    padding: 16px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .web-search-bar span {
    font-size: 13px;
    color: var(--text-light);
    font-weight: 600;
    white-space: nowrap;
  }

  .web-search-bar .btn { font-size: 12px; padding: 6px 12px; }

  .results-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .result-card {
    background: var(--card);
    border-radius: 10px;
    padding: 16px 20px;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: 1fr 40px 1fr;
    gap: 12px;
    align-items: start;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: default;
  }

  .result-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  .lang-col { min-width: 0; }

  .lang-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .lang-label.en { color: #2563eb; }
  .lang-label.es { color: #dc2626; }

  .lang-flag {
    display: inline-block;
    width: 18px;
    height: 13px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .flag-en {
    background: linear-gradient(180deg, #012169 33%, #fff 33%, #fff 40%, #c8102e 40%, #c8102e 60%, #fff 60%, #fff 67%, #012169 67%);
  }

  .flag-es {
    background: linear-gradient(180deg, #c60b1e 25%, #ffc400 25%, #ffc400 75%, #c60b1e 75%);
  }

  .lang-text {
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }

  .lang-text mark {
    background: var(--highlight);
    padding: 1px 3px;
    border-radius: 3px;
    color: inherit;
  }

  .arrow-col {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ccc;
    font-size: 20px;
    padding-top: 16px;
  }

  .meta-badges {
    grid-column: 1 / -1;
    display: flex;
    gap: 8px;
    margin-top: 2px;
  }

  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  .badge-source {
    background: #e8f0fe;
    color: #1a5276;
  }

  .badge-type {
    background: #f0f0f0;
    color: #555;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }

  .no-results h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .no-results p { font-size: 14px; }

  .welcome-msg {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-light);
  }

  .welcome-msg h2 {
    font-size: 22px;
    color: var(--primary);
    margin-bottom: 10px;
  }

  .welcome-msg p { font-size: 14px; line-height: 1.7; max-width: 500px; margin: 0 auto; }

  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    padding: 12px;
  }

  .pagination button {
    padding: 8px 18px;
    border: 1.5px solid var(--border);
    background: var(--card);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary);
    transition: all 0.2s;
  }

  .pagination button:hover:not(:disabled) {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .pagination button:disabled {
    opacity: 0.4;
    cursor: default;
  }

  .pagination span {
    font-size: 13px;
    color: var(--text-light);
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 14px;
    padding: 28px;
    max-width: 520px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }

  .modal h3 {
    margin-bottom: 12px;
    font-size: 18px;
    color: var(--primary);
  }

  .modal p {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .modal-buttons {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--primary-light);
    background: #f0f4f8;
  }

  .drop-zone p { margin: 0; }

  #fileInput { display: none; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--primary);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast.success { background: var(--success); }

  .sources-list {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-light);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .sources-list .source-tag {
    background: #e8f0fe;
    color: #1a5276;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  @media (max-width: 700px) {
    .header-content { flex-direction: column; align-items: flex-start; }
    .search-row { flex-direction: column; }
    .result-card {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .arrow-col {
      padding-top: 0;
      transform: rotate(90deg);
    }
    .filters-row { flex-direction: column; align-items: flex-start; }
    .stats { margin-left: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="logo-area">
      <div class="logo-icon">KT</div>
      <div class="logo-text">
        <h1>Key Translations</h1>
        <p>Translation Memory Dictionary</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="showImportModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        Import Translations
      </button>
      <button class="btn btn-accent" onclick="exportData()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        Export
      </button>
    </div>
  </div>
</header>

<main>
  <section class="search-section">
    <div class="search-row">
      <div class="search-input-wrap">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search in English or Spanish..." autofocus>
      </div>
    </div>
    <div class="filters-row">
      <div class="filter-group">
        <label for="langFilter">Search in:</label>
        <select id="langFilter">
          <option value="both">Both languages</option>
          <option value="en">English only</option>
          <option value="es">Spanish only</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="typeFilter">Type:</label>
        <select id="typeFilter">
          <option value="all">All</option>
          <option value="paragraph">Paragraphs</option>
          <option value="table_cell">Table cells</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="sourceFilter">Source:</label>
        <select id="sourceFilter">
          <option value="all">All sources</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="sortFilter">Sort:</label>
        <select id="sortFilter">
          <option value="relevance">Best match</option>
          <option value="shortest">Shortest first</option>
          <option value="longest">Longest first</option>
          <option value="alpha-en">A-Z (English)</option>
          <option value="alpha-es">A-Z (Spanish)</option>
        </select>
      </div>
      <div class="stats" id="stats"></div>
    </div>
  </section>

  <div class="web-search-bar" id="webSearchBar" style="display:none;">
    <span>Look up online:</span>
    <button class="btn btn-web" onclick="webSearch('deepl')">DeepL</button>
    <button class="btn btn-web" onclick="webSearch('google')">Google Translate</button>
    <button class="btn btn-web" onclick="webSearch('linguee')">Linguee</button>
    <button class="btn btn-web" onclick="webSearch('reverso')">Reverso Context</button>
    <button class="btn btn-web" onclick="webSearch('wordreference')">WordReference</button>
  </div>

  <div class="results-container" id="results"></div>
  <div class="pagination" id="pagination" style="display:none;"></div>
</main>

<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h3>Import Translation Files</h3>
    <p>Load a JSON file with translation pairs. The file should contain an array of objects with <code>"en"</code> and <code>"es"</code> fields. Optional: <code>"source"</code> and <code>"type"</code>.</p>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <p><strong>Click to browse</strong> or drag & drop a JSON file here</p>
    </div>
    <input type="file" id="fileInput" accept=".json">
    <div class="modal-buttons">
      <button class="btn btn-outline" style="color:var(--text);border-color:var(--border);" onclick="closeImportModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  },
  {
    "en": "We have a firm belief that if work is properly planned and executed, all incidents can be prevented. Our goal is to work in a planned and controlled manner. We will do this by ensuring all equipment is in excellent running order and that our work procedures ensure safe operations and our people are properly trained and agree to work in our prescribed manner.",
    "es": "Tenemos la firme convicción de que, si el trabajo se planifica y ejecuta adecuadamente, todos los incidentes pueden prevenirse. Nuestro objetivo es trabajar de manera planificada y controlada. Lograremos esto asegurando que todo el equipo se encuentre en excelentes condiciones de funcionamiento y que nuestros procedimientos de trabajo garanticen operaciones seguras, y que nuestro personal esté debidamente capacitado y acuerde trabajar conforme a nuestros procedimientos establecidos.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Wherever we operate we will:",
    "es": "Dondequiera que operemos:",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Ensure everyone understands the task and is ready to perform it.",
    "es": "Aseguraremos que todos comprendan la tarea y estén preparados para realizarla.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Ensure our employees and contractors are treated equally.",
    "es": "Aseguraremos que nuestros empleados y contratistas sean tratados de manera equitativa.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Meet or exceed all regulations and Health, Safety, Environment and Community (HSEC) Management System requirements.",
    "es": "Cumpliremos o superaremos todas las regulaciones y los requisitos del Sistema de Gestión de Salud, Seguridad, Medio Ambiente y Comunidad (HSEC).",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Provide a drug and alcohol-free workplace.",
    "es": "Proporcionaremos un lugar de trabajo libre de drogas y alcohol.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Implement environmental protection measures that address pollution prevention in all phases of our business.",
    "es": "Implementaremos medidas de protección ambiental que aborden la prevención de la contaminación en todas las fases de nuestro negocio.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Engage with and support the communities where we operate.",
    "es": "Nos relacionaremos con las comunidades donde operamos y las apoyaremos.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Maintain a constant vigilance and readiness to prevent, and where required, respond to and effectively manage any incident.",
    "es": "Mantendremos una vigilancia constante y preparación para prevenir y, cuando sea necesario, responder y gestionar eficazmente cualquier incidente.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Set HSEC objectives and targets",
    "es": "Estableceremos objetivos y metas HSEC.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Drive continual improvement in all activities.",
    "es": "Impulsaremos la mejora continua en todas las actividades.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Accept no performance level other than Zero Harm.",
    "es": "No aceptaremos ningún nivel de desempeño distinto de Cero Daño.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The uncompromising approach we will have to Health, Safety, Environment and Community will truly make our business a success in all respects.",
    "es": "El enfoque intransigente que tendremos respecto de la Salud, Seguridad, Medio Ambiente y Comunidad hará que nuestro negocio sea verdaderamente exitoso en todos los aspectos.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "RESPONSIBILITY",
    "es": "RESPONSABILIDAD",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "All operators, staff and contractors involved with a Typhoon survey must be familiar with and trained in the relevant sections of this SOP and all related documents that apply to their role in the survey.",
    "es": "Todos los operadores, personal y contratistas involucrados en un levantamiento con Typhoon deben estar familiarizados y capacitados en las secciones pertinentes de este POS y en todos los documentos relacionados que se apliquen a su función dentro del levantamiento.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The objective of these documents is to ensure that all persons dealing with the high voltages associated with a Typhoon survey are aware of the necessary procedures to be followed.",
    "es": "El objetivo de estos documentos es asegurar que todas las personas que trabajen con los altos voltajes asociados a un levantamiento con Typhoon estén conscientes de los procedimientos necesarios que deben seguirse.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The overall objective of this procedure is to outline a system whereby:",
    "es": "El objetivo general de este procedimiento es describir un sistema mediante el cual:",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "All personnel working with high voltage geophysical equipment are adequately trained to perform the task.",
    "es": "Todo el personal que trabaje con equipos geofísicos de alto voltaje esté debidamente capacitado para realizar la tarea.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "All personnel are provided with suitable equipment and provisions to carry out the geophysical activities.",
    "es": "A todo el personal se le proporcione el equipo y las provisiones adecuadas para llevar a cabo las actividades geofísicas.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "All personnel working with high-powered geophysical equipment are provided with safe working equipment.",
    "es": "A todo el personal que trabaje con equipos geofísicos de alta potencia se le proporcione equipo de trabajo seguro.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "All personnel working with high-powered geophysical equipment are provided with safe working conditions.",
    "es": "A todo el personal que trabaje con equipos geofísicos de alta potencia se le proporcionen condiciones de trabajo seguras.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "MAINTENANCE",
    "es": "MANTENIMIENTO",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "This document must be reviewed: every year if a deficiency in the procedure is identified if regulatory requirements change, or after an incident occurs.",
    "es": "Este documento debe revisarse: cada año, si se identifica una deficiencia en el procedimiento, si cambian los requisitos regulatorios o después de que ocurra un incidente.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "DEFINITIONS",
    "es": "DEFINICIONES",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Term",
    "es": "Término",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Meaning",
    "es": "Definición",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Project Manager",
    "es": "Gerente de Proyecto",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Senior site personnel, such as a supervisor, lead, or manager",
    "es": "Personal senior del sitio, como un supervisor, jefe de equipo o gerente.",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "RISK ASSESSMENT",
    "es": "EVALUACIÓN DE RIESGOS",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Description of work",
    "es": "Descripción del trabajo",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The Typhoon system consists of a transmitter, generator, wires and cables.",
    "es": "El sistema Typhoon consiste en un transmisor, generador y los cables asociados.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "A typical Typhoon survey involves:",
    "es": "Un levantamiento típico con Typhoon incluye:",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Driving the transmitter and generator to a central point within the survey area",
    "es": "Trasladar el transmisor y el generador a un punto central dentro del área del levantamiento.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Setting up the base station",
    "es": "Instalar la estación base.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Laying out the cables as per the survey design, reaching between 100m to 20 km away from the base in any direction",
    "es": "Desplegar los cables conforme al diseño del levantamiento, extendiéndose entre 100 m y 20 km desde la base en cualquier dirección",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Collect data from receivers",
    "es": "Recopilar datos desde los receptores.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Setting up electrodes",
    "es": "Instalar electrodos.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "High-powered transmission, monitoring and data acquisition",
    "es": "Realizar transmisión de alta potencia, monitoreo y recolección de datos.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Demobilisation (including recovery of transmission wires and electrodes), revegetation and land reclamation, as needed",
    "es": "Desmovilización (incluyendo la recuperación de los cables de transmisión y los electrodos), revegetación y recuperación del terreno, según corresponda",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Significant hazards",
    "es": "Peligros significativos",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The risks associated with a typical Typhoon survey have been thoroughly assessed in the associated risk register.",
    "es": "Los riesgos asociados con un levantamiento típico con Typhoon han sido evaluados exhaustivamente en el registro de riesgos correspondiente.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The following tables contain the most significant risks, ranking 8 or below as per the risk ranking, calibrated using the consequence and likelihood tables used to rate each stage of activity during a Typhoon survey activity (Table 1 to Table 3).",
    "es": "Las siguientes tablas contienen los riesgos más significativos, con clasificación de riesgo igual o inferior a 8 según la matriz de clasificación de riesgos, calibrada utilizando las tablas de consecuencia y probabilidad empleadas para evaluar cada etapa de actividad durante un levantamiento con Typhoon (Tabla 1 a Tabla 3).",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Table 1. Risk ranking matrix. Lower numbers are higher risk.",
    "es": "Tabla 1. Matriz de clasificación de riesgos. Los números más bajos corresponden a mayor riesgo.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Table 2. Consequence definitions applicable to Table 1.",
    "es": "Tabla 2. Definiciones de consecuencias aplicables a la Tabla 1.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Table 3. Likelihood definitions applicable to Table 1.",
    "es": "Tabla 3. Definiciones de probabilidad aplicables a la Tabla 1.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Base set-up & operation",
    "es": "Instalación y operación de la base",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Laying cable and placing electrodes",
    "es": "Tendido de cable y colocación de electrodos",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Inspection and testing",
    "es": "Inspección y pruebas",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Data acquisition",
    "es": "Recolección de datos",
    "source": "SOP_TY_001",

  },
  {
    "en": "Demobilisation",
    "es": "Desmovilización",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Appendix A contains work procedures specific to the operation of Typhoon for a geophysical survey. All crew involved in a Typhoon geophysical survey must be trained in these procedures, which may be modified, as needed, for specific sites or projects.",
    "es": "El Apéndice A contiene procedimientos de trabajo específicos para la operación del Typhoon en un levantamiento geofísico. Todo el personal involucrado en un levantamiento geofísico con Typhoon debe estar capacitado en estos procedimientos, los cuales pueden modificarse, según sea necesario, para sitios o proyectos específicos.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "They include:",
    "es": "Estos incluyen:",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "TYPHOON SITE SET UP",
    "es": "INSTALACIÓN DEL TYPHOON EN EL SITIO",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "How to set up the Typhoon transmitter and generator safely, including choosing location, clearing a fire break, setting up the equipment and earthing and hazardous material management",
    "es": "Cómo instalar de manera segura el transmisor Typhoon y el generador, incluyendo la selección de la ubicación, hacer un cortafuego, la instalación del equipo, la puesta a tierra y la gestión de materiales peligrosos.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "LAYING CABLE, PICKING UP CABLE AND SETTING ELECTRODES",
    "es": "TENDIDO Y RECOGIDA DE CABLES E INSTALACIÓN DE ELECTRODOS",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "How to roll out the cable, make connections, set up the electrodes and test the system prior to full power transmission",
    "es": "Cómo desplegar el cable, realizar las conexiones, instalar los electrodos y probar el sistema antes de la transmisión a plena potencia.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "How to pick up cable using the motorised wire spools.",
    "es": "Cómo recoger el cable utilizando los carretes motorizados.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "DATA ACQUISITION",
    "es": "RECOLECCIÓN DE DATOS",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "How to ensure personnel and livestock remain safe during full power transmission",

    "source": "SOP_TY_001",
    "type": "paragraph"
  },

    "source": "SOP_TY_001",
    "type": "paragraph"

    "source": "SOP_TY_001",

  {
    "en": "In order to respond to potential emergency situations identified in the risk register, the following general emergency response procedures have been developed and must be modified to suit project-specific situations.",
    "es": "Con el fin de responder a posibles situaciones de emergencia identificadas en el registro de riesgos, se han desarrollado los siguientes procedimientos generales de respuesta ante emergencias, los cuales deben modificarse para adaptarse a situaciones específicas de cada proyecto.",

  {

  {
    "en": "The project-specific emergency contacts must be displayed at the Typhoon base station, and distributed to each worker, and in every vehicle.",

    "es": "Control del personal",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "It is the responsibility of the project leader to establish a check in/check out protocol suitable for the project and crew. This will be clearly defined in the project-specific field manual and communicated to all crew members.",
    "es": "Es responsabilidad del líder del proyecto establecer un protocolo de registro de entrada y salida adecuado para el proyecto y la cuadrilla. Este protocolo estará claramente definido en el manual de campo específico del proyecto y será comunicado a todos los miembros de la cuadrilla.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Emergency Shutdown",
    "es": "Apagado de emergencia",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "In any emergency hit the Remote Emergency Stop Button (red button).",
    "es": "En cualquier emergencia, presione el Botón Remoto de Apagado de Emergencia (botón rojo).",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Every person on site will be trained to use the remote emergency stop buttons located outside the container as part of the Typhoon induction (Figure 2).",
    "es": "Cada persona en el sitio será capacitada para utilizar los botones remotos de apagado de emergencia ubicados fuera del contenedor como parte de la inducción de Typhoon (Figura 2).",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Figure 2. Remote emergency stop button for the Typhoon. This is installed at the operator’s work station outside the barricaded area. In emergency hit the button.",
    "es": "Figura 2. Botón remoto de apagado de emergencia para el Typhoon. Se encuentra instalado en la estación de trabajo del operador fuera del área cercada. En caso de emergencia presione el botón.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "In addition to the remote emergency stop button, the system has two auxiliary stop buttons for use as a tertiary isolation points after the remote shutoffs have been activated (see complete Isolation procedures on page 24):",
    "es": "Además del botón remoto de apagado de emergencia, el sistema cuenta con dos botones auxiliares de apagado que se utilizan como puntos de aislamiento después de que se han activado los apagados remotos (ver los procedimientos completos de aislamiento en la página 24):",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Generator stop button: located on the genset control panel.",
    "es": "Botón de apagado del generador: ubicado en el panel de control del grupo electrógeno.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Typhoon stop button: located on control panel of the Typhoon unit.",
    "es": "Botón de apagado del Typhoon: ubicado en el panel de control de la unidad Typhoon.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Emergency shutdown situations include:",
    "es": "Las situaciones de apagado de emergencia incluyen:",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Fire anywhere in or near the Typhoon and/or Generator",
    "es": "Incendio en cualquier lugar dentro o cerca del Typhoon y/o del generador.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "People or animal approaching transmitter wire during full power transmission.",
    "es": "Personas o animales que se acercan al cable del transmisor durante la transmisión a plena potencia.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Abnormal noise coming from Typhoon or Generator.",
    "es": "Ruido anormal proveniente del Typhoon o del generador.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "ANY electrical shock, no matter how minor",
    "es": "CUALQUIER descarga eléctrica, sin importar cuán menor sea.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The stop buttons need to be twisted anticlockwise to release them. Failure to do so will prevent the transmitter from starting.",
    "es": "Los botones de apagado deben girarse en sentido contra reloj para liberarlos. No hacerlo impedirá que el transmisor se ponga en marcha.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Emergency Response Drills",
    "es": "Simulacros de respuesta ante emergencias",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The frequency of Emergency Response Drills (ERD) is dictated by local regulations. At a minimum, drills should be carried out upon setting up the Typhoon, and weekly throughout the project.",
    "es": "La frecuencia de los Simulacros de Respuesta ante Emergencias (ERD) está determinada por las regulaciones locales. Como mínimo, los simulacros deben realizarse al instalar el Typhoon y semanalmente durante todo el proyecto.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "For each ERD, everyone involved in a Typhoon survey should know;",
    "es": "Para cada ERD, todas las personas involucradas en un levantamiento con Typhoon deben conocer:",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {

    "es": "Roles y responsabilidades.",
    "source": "SOP_TY_001",

  },
  {

    "es": "Potenciales emergencias.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Communication procedures",
    "es": "Procedimientos de comunicación.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {

    "es": "Cómo contactar a las familias de los colegas en caso de emergencia.",
    "source": "SOP_TY_001",

  },
  {
    "en": "Evacuation, shelter and accountability procedures",

    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Location and use of common emergency equipment",
    "es": "Ubicación y uso del equipo común de emergencia.",
    "source": "SOP_TY_001",

  },
  {
    "en": "EQUIPMENT SAFETY",
    "es": "SEGURIDAD DE LOS EQUIPOS",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The crew leader is to ensure that all crew are familiar with these general equipment safety notes.",
    "es": "El jefe de cuadrilla debe asegurar que toda la cuadrilla esté familiarizada con estas notas generales de seguridad de los equipos.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Use extreme caution in transmitter operation.",
    "es": "Figura 3. Panel de salida del conector etiquetado para indicar la necesidad de aislar el sistema antes de realizar cambios en las conexiones.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "INCIDENT INVESTIGATION AND REPORTING PROCEDURE",
    "es": "PROCEDIMIENTO DE INVESTIGACIÓN Y REPORTE DE INCIDENTES",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Incidents will be reported as per the instructions in the ERP, and by following the Ivanhoe Electric Incident Management SOP_ALL_002",
    "es": "Los incidentes se reportarán conforme a las instrucciones establecidas en el Plan de Respuesta ante Emergencias y siguiendo la Gestión de Incidentes de Ivanhoe Electric SOP_ALL_002.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },

    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Figure 5. Example signage installed at base station.",

    "source": "SOP_TY_001",
    "type": "paragraph"
  },

    "source": "SOP_TY_001",

  {
    "en": "Isolation procedures",
    "es": "Procedimientos de aislamiento",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The Typhoon isolation procedures ensure that no work is carried out on the geophysical equipment, including any connected cables and electrodes, while energised. Work will not be carried out on the system until all of the circuits and apparatus are ‘locked out’ and checked, and that the risk of a person coming into contact with live equipment has been eliminated.",
    "es": "Los procedimientos de aislamiento de Typhoon garantizan que no se realice ningún trabajo en los equipos geofísicos, incluidos los cables y electrodos conectados, mientras estén energizados. No se realizará trabajo en el sistema hasta que todos los circuitos y equipos hayan sido “bloqueados” y verificados, y hasta que se haya eliminado el riesgo de que una persona entre en contacto con equipos energizados.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The Typhoon system includes four safety beacons, 2 red and 2 orange mounted around the Typhoon. The beacon system has been certified to SIL 2 according to standards EN61511-1 to 3 and EN61508-3 on 3 April 2014. The beacon has three indicator modes:",
    "es": "Para Typhoon, el aislamiento eléctrico total implica:",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "OFF: The system is de-energised to less than 24V.",
    "es": "Activar el botón remoto de apagado de emergencia del Typhoon (quedará bloqueado en posición).",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Safe to touch.",
    "es": "Esperar hasta que TODAS las balizas de señal estén apagadas.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "ORANGE: The system is energised to greater than 24 V.",
    "es": "Asegurar que el sistema esté desenergizado iniciando la prueba de balizas con el botón verde instalado en la estación de trabajo remota. Verificar que las balizas naranjas se enciendan y apaguen para asegurar que las balizas están activas y que el sistema está funcionando. Esto verifica que el sistema está desenergizado.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "DO NOT APPROACH WIRES, ELECTRODES, OR INSTRUMENT.",
    "es": "Desactivar y aislar la unidad de control remoto (por ejemplo, guardarla bajo llave dentro de un vehículo).",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "RED: The system is actively transmitting current.",
    "es": "Aislar la batería del grupo electrógeno apagando el interruptor rojo de aislamiento de batería en el generador.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "DO NOT APPROACH WIRES, ELECTRODES, OR INSTRUMENT.",
    "es": "Cuando un técnico calificado esté trabajando en el Typhoon o en el grupo electrógeno, el área de trabajo debe estar acordonada para evitar el acceso de personal no autorizado.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "For Typhoon, total electrical isolation involves:",
    "es": "El sistema ahora será seguro. El trabajo (incluyendo mantenimiento del Typhoon o del grupo electrógeno, movimiento y conexión/desconexión de cables y electrodos, etc.) puede ahora realizarse en el sistema. El trabajo deberá documentarse posteriormente y el área y el equipo deberán inspeccionarse antes de restablecer la energía.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Working at heights",
    "es": "Trabajo en altura",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "A ladder is required to place the Typhoon covers on top of the transmitter. The correct equipment and procedure are outlined in the ‘base station set up’ work procedure in Appendix A.",
    "es": "Se requiere una escalera para colocar las cubiertas del Typhoon sobre el transmisor. El equipo y el procedimiento correctos se describen en el procedimiento de trabajo “instalación de la estación base” en el Apéndice A.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Hazardous material handling",
    "es": "Manipulación de materiales peligrosos",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "All hazardous materials will be handled according to their associated Material Safety Data Sheet (MSDS). The person handling the hazardous material will ensure they have the correct MSDS and follow all instructions relating to transfer, containment, PPE etc. The MSDS must be stored with the Safe Operating Procedure.",
    "es": "Todos los materiales peligrosos se manipularán de acuerdo con su correspondiente Hoja de Datos de Seguridad de Materiales (HDSM). La persona que manipule el material peligroso se asegurará de contar con la HDSM correcta y de seguir todas las instrucciones relacionadas con el transporte, contención, EPP, etc. La HDSM debe almacenarse junto con el Procedimiento Operativo Seguro.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Relevant materials commonly used during a Typhoon survey are:",
    "es": "Los materiales relevantes comúnmente utilizados durante un levantamiento con Typhoon son:",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Diesel fuel",
    "es": "Combustible diésel.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Motor oil, coolant, transmission fluid, lubricants, and other fluids used during operation and daily maintenance of the generator and survey vehicles",
    "es": "Aceite de motor, refrigerante, fluido de transmisión, lubricantes y otros fluidos utilizados durante la operación y el mantenimiento diario del generador y de los vehículos del levantamiento.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Lead acid batteries (generator and vehicles)",
    "es": "Baterías de plomo-ácido (generador y vehículos).",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Alkaline, lithium ion and other portable device batteries (radios, phones, GPX units)",
    "es": "Baterías alcalinas, de ion-litio y otras baterías de dispositivos portátiles (radios, teléfonos, unidades GPX).",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "But other relevant SDS must be sourced and assessed before being used on survey.",
    "es": "Pero otras Hoja de Datos de Seguridad relevantes deben obtenerse y evaluarse antes de ser utilizadas en el levantamiento.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "EQUIPMENT INSPECTION AND MAINTENANCE SCHEDULE",
    "es": "PROGRAMA DE INSPECCIÓN Y MANTENCIÓN DE EQUIPOS",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "All equipment must be inspected and maintained as per the associated operations manual. Only qualified technicians may make repairs. Isolation procedures will be followed.",
    "es": "Todo el equipo debe ser inspeccionado y mantenido conforme al manual de operación correspondiente. Solo técnicos calificados podrán realizar reparaciones. Se seguirán los procedimientos de aislamiento.",

  {
    "en": "Medical emergency requiring aid from an outside agency, i.e. first aid beyond the training and ability of on-site crew. Examples include electric shock, burns, severe bleeding or broken/severed limbs, severe allergic reaction. All electric shocks, regardless of how minor, require immediate professional medical assessment",
    "es": "Emergencia médica que requiere asistencia de una entidad externa, es decir, primeros auxilios que exceden la capacitación y capacidad del personal en el sitio. Ejemplos incluyen descarga eléctrica, quemaduras, hemorragias graves o extremidades fracturadas/seccionadas, reacción alérgica severa. Todas las descargas eléctricas, independientemente de lo leves que parezcan, requieren evaluación médica profesional inmediata.",

    "type": "table_cell"

  },
  {
    "en": "Administer first aid as required: Where required, apply basic life support: Danger Responsive Airway Breaths Compressions Defibrillator and continue CPR until qualified personnel arrive or signs of life return.",

    "source": "SOP_TY_001",

  },
  {

    "en": "Potential emergency",
    "es": "Emergencia potencial",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Electrical storm during a Typhoon survey Death or serious injuries to personnel and livestock. Potential damage to equipment. Fire.",
    "es": "Tormenta eléctrica durante un levantamiento con Typhoon. Muerte o lesiones graves al personal y al ganado. Posible daño a los equipos. Incendio.",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {

    "es": "Ubicación del equipo de emergencia",
    "source": "SOP_TY_001",

  {

    "es": "Botones de apagado de emergencia Botiquines de primeros auxilios Equipos de comunicación Extintores de incendio",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Crew training requirements",
    "es": "Requisitos de capacitación de la cuadrilla",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Typhoon induction checklist, including this ERP, communication protocols, emergency stop, spill kit locations and contents – all Basic first aid - all",
    "es": "Checklist de inducción sobre Typhoon, incluyendo este PRE, protocolos de comunicación, apagado de emergencia, ubicación y contenido de los kits de derrames – todos Primeros auxilios básicos - todos",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Actions",
    "es": "Acciones",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Role",
    "es": "Rol",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Crew leader (or delegate) is responsible for ongoing monitoring of local weather services. Ensure vehicles are not parked under trees.",
    "es": "1. El jefe de cuadrilla (o su delegado) es responsable del monitoreo continuo de los servicios meteorológicos locales. Se debe asegurar de que los vehículos no estén estacionados bajo árboles.",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Crew leader",
    "es": "Jefe de cuadrilla",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "In the event of an approaching thunderstorm (weather service thunderstorm advisory, visible lightning, thunder heard, lightning detector alarm activated) the survey will be shut down immediately.",
    "es": "2. En caso de aproximación de una tormenta eléctrica (aviso de tormenta eléctrica del servicio meteorológico, rayos visibles, truenos audibles, activación de alarma del detector de rayos), se suspenderá inmediatamente el levantamiento.",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Crew leader",
    "es": "Jefe de cuadrilla",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Activate Typhoon emergency stop procedure",
    "es": "3. Activar el procedimiento de apagado de emergencia del Typhoon",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Crew leader",
    "es": "Jefe de cuadrilla",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Disconnect the transmitter and receiver from all wires to prevent damage to the equipment. Transmitter wire should be kept out of puddles.",
    "es": "4. Desconectar el transmisor y el receptor de todos los cables para evitar daños al equipo. El cable del transmisor deberá mantenerse fuera de charcos de agua.",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Crew leader",
    "es": "Jefe de cuadrilla",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Personnel to seek shelter: inside buildings or closed-top vehicles with the windows up avoiding contact with metallic objects. If no shelter available, these actions may reduce your risk: Avoid open fields, the top of a hill or a ridge top. Stay away from tall, isolated trees or other tall objects. If you are in a forest, stay near a lower stand of trees. Stay away from water, wet items (such as ropes) and metal objects (such as fences and poles). Water and metal are excellent conductors of electricity.",
    "es": "5. El personal debe buscar refugio: dentro de edificios o vehículos con techo cerrado y ventanas arriba, evitando el contacto con objetos metálicos. Si no hay refugio disponible, estas acciones pueden reducir el riesgo: Evitar campos abiertos, la cima o cresta de un cerro. Mantenerse alejado de árboles altos u otros objetos altos. Si está en un bosque, permanecer cerca de un grupo de árboles más bajos. Mantenerse alejado del agua, objetos húmedos (como cuerdas) y objetos metálicos (como cercas y postes). El agua y el metal son excelentes conductores de electricidad.",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Crew leader, all",
    "es": "Jefe de cuadrilla, todos",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Crew leader to give all clear after 30 minutes with no thunder. Personnel to remain in shelter until the all clear is given",
    "es": "6. El jefe de cuadrilla dará la señal de “todo despejado” después de 30 minutos sin truenos. El personal debe permanecer en el refugio hasta que se dé esta señal.",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Crew leader",
    "es": "Jefe de cuadrilla",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "Do not move the cables in a thunderstorm. A lightning strike near a wire can induce a current capable of killing a person.",
    "es": "7. No mover los cables durante una tormenta eléctrica. Un rayo cercano a un cable puede inducir una corriente capaz de matar a una persona.",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "All",
    "es": "Todos",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },
  {
    "en": "If a person is electrocuted, follow the SERIOUS MEDICAL EMERGENCY ERP.",
    "es": "8. Si una persona es electrocutada, seguir el PRE de EMERGENCIA MÉDICA GRAVE.",
    "source": "SOP_TY_001",
    "type": "table_cell"
  },

  {
    "en": "APPENDIX F: TYPHOON COMPONENTS",
    "es": "ANEXO F: COMPONENTES DEL TYPHOON",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Selecting the correct wire",
    "es": "Selección del cable adecuado",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "A primary consideration prior to using any geophysical transmitter is the type and current carrying capacity of the wire used for the survey. It is the responsibility of the operator to ensure that wire used with is adequate for the task and in good condition.",
    "es": "Una consideración clave antes de utilizar cualquier transmisor geofísico es el tipo de cable y la capacidad de conducción de corriente del cable utilizado para el levantamiento. Es responsabilidad del operador asegurarse de que el cable utilizado sea adecuado para la tarea y que se encuentre en buen estado.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The maximum voltage and current settings used for a given application will depend on the current carrying capacity of the wire and the length and number of turns of wire used (but never to exceed 10000 volts). Factors which determine the current carrying capacity of the wire are cross-sectional area, wire type, ambient temperature and the duty cycle used for the transmit waveform. It is necessary to ensure that the wire is capable of carrying the current required.",
    "es": "Los valores máximos de tensión y corriente utilizados en una aplicación determinada dependerán de la capacidad de conducción de corriente del cable, así como de su longitud y del número de vueltas del cable utilizado (pero en ningún caso deberán exceder los 10.000 voltios). Los factores que determinan la capacidad de conducción de corriente del cable incluyen el área de la sección transversal, el tipo de cable, la temperatura ambiente y el ciclo de trabajo utilizado para la forma de onda de transmisión. Se deberá asegurar que el cable sea capaz de transportar la corriente requerida",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Figure 10 and Figure 11 show the current carrying capacities for various wire sizes. Care should be taken not to exceed the current rating. IVNE standards are 35 mm for grounded electrodes and 50 mm for electromagnetic loops.",
    "es": "Las Figuras 10 y 11 muestran las capacidades de conducción de corriente para distintos tamaños de cable. Se deberá tener cuidado de no exceder la corriente nominal del cable. Los estándares de IVNE son de 35 mm² para electrodos de puesta a tierra y de 50 mm² para bucles electromagnéticos.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Figure 10. Carrying capacity at different air temperature for 100% duty cycles 10AWG cable (Ref: EP3E, 2012)",
    "es": "Figura 10. Capacidad de conducción de corriente a distintas temperaturas ambiente para ciclos de trabajo del 100% con cable calibre 10 AWG (Ref.: EP3E, 2012).",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Figure 11. Carrying capacity at different air temperature for 100% duty cycles 50mm² and 35mm² cable (Ref: EP3E, 2012)",
    "es": "Figura 11. Capacidad de conducción de corriente a distintas temperaturas ambiente para ciclos de trabajo del 100% con cables de 50 mm² y 35 mm² (Ref.: EP3E, 2012).",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Multimeter",
    "es": "Multímetro",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "A 1000 V CAT IV Elma BM 829 multimeter is connected to the output terminals during an IP survey to allow the operator to ensure that no current is present in the cables before he provides the all clear signal to crew.",
    "es": "Se conecta un multímetro Elma BM 829 (1000 V CAT IV) a los terminales de salida durante un levantamiento IP, para permitir al operador verificar que no exista tensión en los cables antes de dar la señal de “todo despejado” a la cuadrilla.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "See Supporting Technical Documents: Appendix F5-F6",
    "es": "Ver documentos técnicos de respaldo: Anexo F5-F6",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Typhoon beacon",
    "es": "Baliza del Typhoon",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "We have four beacons on the top of the container during operation; they are held in place by magnets and satisfy Ingress Protection Rating IP65.",
    "es": "Durante la operación, el sistema cuenta con cuatro balizas ubicadas en la parte superior del contenedor, sujetas mediante imanes y con grado de protección IP65.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The Typhoon system includes four safety beacons, 2 red and 2 orange mounted on each corner of the Typhoon container. The beacon system has been certified to SIL 2 according to standards EN61511-1 to 3 and EN61508-3 on 3 April 2014. The beacon has three indicator modes:",
    "es": "Ver documentos técnicos de respaldo: Anexo F7-F8",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "OFF: The system is de-energised to less than 24V.",
    "es": "Ver documentos de certificación SIL: Anexo F9",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Typhoon container – transmitter output",
    "es": "Contenedor del Typhoon – salida del transmisor",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The output connector is made by electrical feed-through with 1kV-200A insulation, but the feed-through are assembled on a polyamide plate with a clearance distance from ground ~100mm and between each feed-through. This allows and gives a big margin again the maximal 10kV output of the transmitter.",
    "es": "El conector de salida está constituido por pasamuros eléctricos con aislamiento de 1 kV – 200 A. Estos pasamuros se encuentran montados sobre una placa de poliamida, con una distancia de aislamiento respecto de tierra de aproximadamente 100 mm, así como entre cada pasamuros. Esto proporciona un margen de seguridad adecuado frente a la salida máxima de 10 kV del transmisor.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "To connect survey cable to transmitter output, be sure that the Typhoon is stopped. Check if the beacons are not blinking.",
    "es": "Para conectar el cable del levantamiento a la salida del transmisor, asegúrese de que el Typhoon esté detenido. Verifique que las balizas no se encuentren prendidas.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "If all these conditions are fulfilled, unlock and open the door. Use a 17mm spanner wrench or pipe wrench and counter-clockwise the nut. Remove insulator from the wire on 40mm and turn the wire around the threaded rod. Place washer, then nut and clock-wise it. Do the same with the other wire.",
    "es": "Si se cumplen estas condiciones, desbloquee y abra la puerta. Utilice una llave de 17 mm o una llave Stillson y gire la tuerca en sentido contra reloj. Retire 40 mm del aislamiento del cable y enróllelo alrededor de la varilla roscada. Coloque la arandela, luego la tuerca, y apriétela en sentido del reloj. Repita el procedimiento con el otro cable.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Figure 16: Transmitter output view",
    "es": "Figura 16: Vista de la salida del transmisor",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Grounding and Current Electrodes pits",
    "es": "Puesta a tierra y pozos de electrodos de corriente",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The TYPHOON is provided with an Earth Rod which is simply hammered into the ground near the transmitter. The soil surrounding the earth rod should be watered to improve electrical conductivity.",
    "es": "El Typhoon está provisto de una varilla de puesta a tierra, la cual se introduce en el suelo mediante golpes con martillo cerca del transmisor. El suelo alrededor de la varilla de tierra debe humedecerse con agua para mejorar la conductividad eléctrica.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "The Earth Rod is connected to the TYPHOON transmitter module via a 5m cable (see TYPHOON Operations Manual for connection details). Correct setup of the TYPHOON is shown in Figure 17 - Figure 19. Typical current electrode pits are shown in Figure 20.",
    "es": "La varilla de tierra se conecta al módulo transmisor del Typhoon mediante un cable de 5 m (ver el Manual de Operación del Typhoon para los detalles de conexión). La instalación correcta del Typhoon se muestra en las Figuras 17 a 19. Los pozos típicos de electrodos de corriente se muestran en la Figura 20.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Figure 17: Setup configuration for the TYPHOON transmitter: wire connection.",
    "es": "Figura 17: Configuración de instalación para el transmisor Typhoon: conexión del cable.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Figure 18: Setup configuration for the TYPHOON transmitter, output cable connection.",
    "es": "Figura 18: Configuración de instalación para el transmisor Typhoon, conexión del cable de salida.",
    "source": "SOP_TY_001",
    "type": "paragraph"
  },
  {
    "en": "Figure 19: Setup configuration for the TYPHOON transmitter: salt to increase earth rod conductivity.",

let allTranslations = [];
let filteredResults = [];
let currentPage = 1;
const PAGE_SIZE = 50;

function init() {
  allTranslations = deduplicateTranslations(TRANSLATIONS_DATA);
  updateSourceFilter();
  updateStats();
  renderWelcome();
  setupEventListeners();
}

function deduplicateTranslations(data) {
  const seen = new Set();
  return data.filter(item => {
    if (!item.en || !item.es) return false;
    const en = item.en.trim();
    const es = item.es.trim();
    if (!en || !es) return false;
    if (en.length <= 2 && /^\d+$/.test(en)) return false;
    const key = en.toLowerCase() + '|||' + es.toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function updateSourceFilter() {
  const sources = [...new Set(allTranslations.map(t => t.source || 'Unknown'))].sort();
  const sel = document.getElementById('sourceFilter');
  sel.innerHTML = '<option value="all">All sources</option>';
  sources.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    sel.appendChild(opt);
  });
}

function updateStats() {
  const sources = new Set(allTranslations.map(t => t.source || 'Unknown'));
  document.getElementById('stats').innerHTML =
    `<strong>${allTranslations.length}</strong> translation pairs from <strong>${sources.size}</strong> source${sources.size !== 1 ? 's' : ''}`;
}

function setupEventListeners() {
  const searchInput = document.getElementById('searchInput');
  let debounce;
  searchInput.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => { currentPage = 1; performSearch(); }, 200);
  });

  ['langFilter', 'typeFilter', 'sourceFilter', 'sortFilter'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => { currentPage = 1; performSearch(); });
  });

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => handleFiles(fileInput.files));
}

function performSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const langFilter = document.getElementById('langFilter').value;
  const typeFilter = document.getElementById('typeFilter').value;
  const sourceFilter = document.getElementById('sourceFilter').value;
  const sortFilter = document.getElementById('sortFilter').value;

  const webBar = document.getElementById('webSearchBar');
  webBar.style.display = query.length > 0 ? 'flex' : 'none';

  if (!query) {
    renderWelcome();
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  const words = query.split(/\s+/).filter(w => w.length > 0);

  filteredResults = allTranslations
    .map(t => {
      const en = (t.en || '').toLowerCase();
      const es = (t.es || '').toLowerCase();

      let score = 0;
      let matches = false;

      for (const word of words) {
        const enMatch = en.includes(word);
        const esMatch = es.includes(word);

        if (langFilter === 'en' && !enMatch) return null;
        if (langFilter === 'es' && !esMatch) return null;
        if (langFilter === 'both' && !enMatch && !esMatch) return null;

        if (enMatch || esMatch) matches = true;

        if (en === query || es === query) score += 100;
        if (en.startsWith(query) || es.startsWith(query)) score += 50;
        if (enMatch) score += 10;
        if (esMatch) score += 10;
      }

      if (!matches) return null;
      if (typeFilter !== 'all' && t.type !== typeFilter) return null;
      if (sourceFilter !== 'all' && t.source !== sourceFilter) return null;

      const lenPenalty = Math.min(t.en.length + t.es.length, 500) / 500;
      score -= lenPenalty * 5;

      return { ...t, score };
    })
    .filter(Boolean);

  switch (sortFilter) {
    case 'relevance': filteredResults.sort((a, b) => b.score - a.score); break;
    case 'shortest': filteredResults.sort((a, b) => a.en.length - b.en.length); break;
    case 'longest': filteredResults.sort((a, b) => b.en.length - a.en.length); break;
    case 'alpha-en': filteredResults.sort((a, b) => a.en.localeCompare(b.en)); break;
    case 'alpha-es': filteredResults.sort((a, b) => a.es.localeCompare(b.es)); break;
  }

  renderResults(query);
}

function renderWelcome() {
  document.getElementById('results').innerHTML = `
    <div class="welcome-msg">
      <h2>Search your translation memory</h2>
      <p>Type a word or phrase in English or Spanish to find previous translations.
      Use the filters to narrow results by language, type, or source document.</p>
      <div class="sources-list" style="justify-content:center;margin-top:14px;">
        <span>Loaded sources:</span>
        ${[...new Set(allTranslations.map(t => t.source || 'Unknown'))].map(s =>
          `<span class="source-tag">${escapeHtml(s)}</span>`
        ).join('')}
      </div>
    </div>`;
}

function renderResults(query) {
  const container = document.getElementById('results');
  const total = filteredResults.length;

  if (total === 0) {
    container.innerHTML = `
      <div class="no-results">
        <h3>No matches found</h3>
        <p>Try a different search term or use the web search buttons above to look it up online.</p>
      </div>`;
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filteredResults.slice(start, start + PAGE_SIZE);

  container.innerHTML = pageItems.map(t => {
    const enHtml = highlightText(t.en, query);
    const esHtml = highlightText(t.es, query);
    const typeName = t.type === 'table_cell' ? 'Table' : 'Paragraph';
    return `
      <div class="result-card">
        <div class="lang-col">
          <div class="lang-label en"><span class="lang-flag flag-en"></span> English</div>
          <div class="lang-text">${enHtml}</div>
        </div>
        <div class="arrow-col">&harr;</div>
        <div class="lang-col">
          <div class="lang-label es"><span class="lang-flag flag-es"></span> Spanish</div>
          <div class="lang-text">${esHtml}</div>
        </div>
        <div class="meta-badges">
          <span class="badge badge-source">${escapeHtml(t.source || 'Unknown')}</span>
          <span class="badge badge-type">${typeName}</span>
        </div>
      </div>`;
  }).join('');

  const pagEl = document.getElementById('pagination');
  if (totalPages > 1) {
    pagEl.style.display = 'flex';
    pagEl.innerHTML = `
      <button ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">Previous</button>
      <span>Page ${currentPage} of ${totalPages} (${total} results)</span>
      <button ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next</button>`;
  } else {
    pagEl.style.display = 'none';
    const countLine = document.createElement('div');
    countLine.style.cssText = 'text-align:center;padding:8px;font-size:13px;color:#666;';
    countLine.textContent = `${total} result${total !== 1 ? 's' : ''}`;
    container.appendChild(countLine);
  }
}

function goPage(n) {
  currentPage = n;
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  renderResults(query);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function highlightText(text, query) {
  const safe = escapeHtml(text);
  if (!query) return safe;
  const words = query.split(/\s+/).filter(w => w.length > 0);
  let result = safe;
  for (const word of words) {
    const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escaped})`, 'gi');
    result = result.replace(regex, '<mark>$1</mark>');
  }
  return result;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function webSearch(engine) {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  const encoded = encodeURIComponent(query);
  const urls = {
    deepl: `https://www.deepl.com/translator#en/es/${encoded}`,
    google: `https://translate.google.com/?sl=en&tl=es&text=${encoded}`,
    linguee: `https://www.linguee.com/english-spanish/search?query=${encoded}`,
    reverso: `https://context.reverso.net/translation/english-spanish/${encoded}`,
    wordreference: `https://www.wordreference.com/es/translation.asp?tranword=${encoded}`
  };
  window.open(urls[engine], '_blank');
}

function showImportModal() {
  document.getElementById('importModal').classList.add('active');
}

function closeImportModal() {
  document.getElementById('importModal').classList.remove('active');
}

function handleFiles(files) {
  if (!files || !files.length) return;
  const file = files[0];
  if (!file.name.endsWith('.json')) {
    showToast('Please select a JSON file.', false);
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Expected an array');
      const valid = data.filter(d => d.en && d.es);
      if (!valid.length) throw new Error('No valid translation pairs found');

      valid.forEach(d => {
        if (!d.source) d.source = file.name.replace('.json', '');
        if (!d.type) d.type = 'imported';
      });

      const before = allTranslations.length;
      allTranslations = deduplicateTranslations([...allTranslations, ...valid]);
      const added = allTranslations.length - before;

      updateSourceFilter();
      updateStats();
      closeImportModal();
      showToast(`Imported ${added} new translation pairs from ${file.name}`, true);
      performSearch();
    } catch (err) {
      showToast('Error reading file: ' + err.message, false);
    }
  };
  reader.readAsText(file);
}

function exportData() {
  const data = filteredResults.length > 0 ? filteredResults.map(({score, ...rest}) => rest) : allTranslations;
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filteredResults.length > 0 ? 'key_translations_filtered.json' : 'key_translations_all.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Exported ${data.length} translations`, true);
}

function showToast(msg, success) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (success ? ' success' : '');
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('importModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeImportModal();
});

init();
</script>
