<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key Translations - Translation Dictionary</title>
<style>
  :root {
    --primary: #1a3a5c;
    --primary-light: #2a5a8c;
    --accent: #e8b931;
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #333333;
    --text-light: #666666;
    --border: #dde3ea;
    --highlight: #fff3cd;
    --success: #28a745;
    --shadow: 0 2px 8px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    padding: 20px 0;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 800;
    color: var(--primary);
    flex-shrink: 0;
  }

  .logo-text h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .logo-text p {
    font-size: 12px;
    opacity: 0.8;
    margin-top: 1px;
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn-accent {
    background: var(--accent);
    color: var(--primary);
  }

  .btn-accent:hover { background: #d4a620; }

  .btn-outline {
    background: transparent;
    color: white;
    border: 1.5px solid rgba(255,255,255,0.4);
  }

  .btn-outline:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.7);
  }

  .btn-web {
    background: #e9ecef;
    color: var(--text);
  }

  .btn-web:hover { background: #dde1e5; }

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
  }

  .search-section {
    background: var(--card);
    border-radius: 12px;
    padding: 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }

  .search-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .search-input-wrap {
    flex: 1;
    position: relative;
  }

  .search-input-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: #999;
  }

  #searchInput {
    width: 100%;
    padding: 14px 14px 14px 42px;
    border: 2px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
    transition: border-color 0.2s;
    outline: none;
  }

  #searchInput:focus { border-color: var(--primary-light); }

  #searchInput::placeholder { color: #aaa; }

  .filters-row {
    display: flex;
    gap: 16px;
    margin-top: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-group {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-light);
  }

  .filter-group select {
    padding: 6px 10px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    background: white;
    cursor: pointer;
    outline: none;
  }

  .filter-group select:focus { border-color: var(--primary-light); }

  .stats {
    margin-left: auto;
    font-size: 13px;
    color: var(--text-light);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .stats strong { color: var(--primary); }

  .web-search-bar {
    background: var(--card);
    border-radius: 12px;
    padding: 16px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .web-search-bar span {
    font-size: 13px;
    color: var(--text-light);
    font-weight: 600;
    white-space: nowrap;
  }

  .web-search-bar .btn { font-size: 12px; padding: 6px 12px; }

  .results-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .result-card {
    background: var(--card);
    border-radius: 10px;
    padding: 16px 20px;
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: 1fr 40px 1fr;
    gap: 12px;
    align-items: start;
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: default;
  }

  .result-card:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  .lang-col { min-width: 0; }

  .lang-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .lang-label.en { color: #2563eb; }
  .lang-label.es { color: #dc2626; }

  .lang-flag {
    display: inline-block;
    width: 18px;
    height: 13px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .flag-en {
    background: linear-gradient(180deg, #012169 33%, #fff 33%, #fff 40%, #c8102e 40%, #c8102e 60%, #fff 60%, #fff 67%, #012169 67%);
  }

  .flag-es {
    background: linear-gradient(180deg, #c60b1e 25%, #ffc400 25%, #ffc400 75%, #c60b1e 75%);
  }

  .lang-text {
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
  }

  .lang-text mark {
    background: var(--highlight);
    padding: 1px 3px;
    border-radius: 3px;
    color: inherit;
  }

  .arrow-col {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ccc;
    font-size: 20px;
    padding-top: 16px;
  }

  .meta-badges {
    grid-column: 1 / -1;
    display: flex;
    gap: 8px;
    margin-top: 2px;
  }

  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  .badge-source {
    background: #e8f0fe;
    color: #1a5276;
  }

  .badge-type {
    background: #f0f0f0;
    color: #555;
  }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }

  .no-results h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
  .no-results p { font-size: 14px; }

  .welcome-msg {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-light);
  }

  .welcome-msg h2 {
    font-size: 22px;
    color: var(--primary);
    margin-bottom: 10px;
  }

  .welcome-msg p { font-size: 14px; line-height: 1.7; max-width: 500px; margin: 0 auto; }

  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    padding: 12px;
  }

  .pagination button {
    padding: 8px 18px;
    border: 1.5px solid var(--border);
    background: var(--card);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary);
    transition: all 0.2s;
  }

  .pagination button:hover:not(:disabled) {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }

  .pagination button:disabled {
    opacity: 0.4;
    cursor: default;
  }

  .pagination span {
    font-size: 13px;
    color: var(--text-light);
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--card);
    border-radius: 14px;
    padding: 28px;
    max-width: 520px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }

  .modal h3 {
    margin-bottom: 12px;
    font-size: 18px;
    color: var(--primary);
  }

  .modal p {
    font-size: 13px;
    color: var(--text-light);
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .modal-buttons {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--primary-light);
    background: #f0f4f8;
  }

  .drop-zone p { margin: 0; }

  #fileInput { display: none; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--primary);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 300;
  }

  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  .toast.success { background: var(--success); }

  .sources-list {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-light);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .sources-list .source-tag {
    background: #e8f0fe;
    color: #1a5276;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }

  @media (max-width: 700px) {
    .header-content { flex-direction: column; align-items: flex-start; }
    .search-row { flex-direction: column; }
    .result-card {
      grid-template-columns: 1fr;
      gap: 8px;
    }
    .arrow-col {
      padding-top: 0;
      transform: rotate(90deg);
    }
    .filters-row { flex-direction: column; align-items: flex-start; }
    .stats { margin-left: 0; }
  }
</style>
</head>
<body>

<header>
  <div class="header-content">
    <div class="logo-area">
      <div class="logo-icon">KT</div>
      <div class="logo-text">
        <h1>Key Translations</h1>
        <p>Translation Memory Dictionary</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="showImportModal()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        Import Translations
      </button>
      <button class="btn btn-accent" onclick="exportData()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        Export
      </button>
    </div>
  </div>
</header>

<main>
  <section class="search-section">
    <div class="search-row">
      <div class="search-input-wrap">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Search in English or Spanish..." autofocus>
      </div>
    </div>
    <div class="filters-row">
      <div class="filter-group">
        <label for="langFilter">Search in:</label>
        <select id="langFilter">
          <option value="both">Both languages</option>
          <option value="en">English only</option>
          <option value="es">Spanish only</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="typeFilter">Type:</label>
        <select id="typeFilter">
          <option value="all">All</option>
          <option value="paragraph">Paragraphs</option>
          <option value="table_cell">Table cells</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="sourceFilter">Source:</label>
        <select id="sourceFilter">
          <option value="all">All sources</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="sortFilter">Sort:</label>
        <select id="sortFilter">
          <option value="relevance">Best match</option>
          <option value="shortest">Shortest first</option>
          <option value="longest">Longest first</option>
          <option value="alpha-en">A-Z (English)</option>
          <option value="alpha-es">A-Z (Spanish)</option>
        </select>
      </div>
      <div class="stats" id="stats"></div>
    </div>
  </section>

  <div class="web-search-bar" id="webSearchBar" style="display:none;">
    <span>Look up online:</span>
    <button class="btn btn-web" onclick="webSearch('deepl')">DeepL</button>
    <button class="btn btn-web" onclick="webSearch('google')">Google Translate</button>
    <button class="btn btn-web" onclick="webSearch('linguee')">Linguee</button>
    <button class="btn btn-web" onclick="webSearch('reverso')">Reverso Context</button>
    <button class="btn btn-web" onclick="webSearch('wordreference')">WordReference</button>
  </div>

  <div class="results-container" id="results"></div>
  <div class="pagination" id="pagination" style="display:none;"></div>
</main>

<div class="modal-overlay" id="importModal">
  <div class="modal">
    <h3>Import Translation Files</h3>
    <p>Load a JSON file with translation pairs. The file should contain an array of objects with <code>"en"</code> and <code>"es"</code> fields. Optional: <code>"source"</code> and <code>"type"</code>.</p>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <p><strong>Click to browse</strong> or drag & drop a JSON file here</p>
    </div>
    <input type="file" id="fileInput" accept=".json">
    <div class="modal-buttons">
      <button class="btn btn-outline" style="color:var(--text);border-color:var(--border);" onclick="closeImportModal()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TRANSLATIONS_DATA = [];

let allTranslations = [];
let filteredResults = [];
let currentPage = 1;
const PAGE_SIZE = 50;

function init() {
  allTranslations = deduplicateTranslations(TRANSLATIONS_DATA);
  updateSourceFilter();
  updateStats();
  renderWelcome();
  setupEventListeners();
}

function deduplicateTranslations(data) {
  const seen = new Set();
  return data.filter(item => {
    if (!item.en || !item.es) return false;
    const en = item.en.trim();
    const es = item.es.trim();
    if (!en || !es) return false;
    if (en.length <= 2 && /^\d+$/.test(en)) return false;
    const key = en.toLowerCase() + '|||' + es.toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function updateSourceFilter() {
  const sources = [...new Set(allTranslations.map(t => t.source || 'Unknown'))].sort();
  const sel = document.getElementById('sourceFilter');
  sel.innerHTML = '<option value="all">All sources</option>';
  sources.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    opt.textContent = s;
    sel.appendChild(opt);
  });
}

function updateStats() {
  const sources = new Set(allTranslations.map(t => t.source || 'Unknown'));
  document.getElementById('stats').innerHTML =
    `<strong>${allTranslations.length}</strong> translation pairs from <strong>${sources.size}</strong> source${sources.size !== 1 ? 's' : ''}`;
}

function setupEventListeners() {
  const searchInput = document.getElementById('searchInput');
  let debounce;
  searchInput.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(() => { currentPage = 1; performSearch(); }, 200);
  });

  ['langFilter', 'typeFilter', 'sourceFilter', 'sortFilter'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => { currentPage = 1; performSearch(); });
  });

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => handleFiles(fileInput.files));
}

function performSearch() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  const langFilter = document.getElementById('langFilter').value;
  const typeFilter = document.getElementById('typeFilter').value;
  const sourceFilter = document.getElementById('sourceFilter').value;
  const sortFilter = document.getElementById('sortFilter').value;

  const webBar = document.getElementById('webSearchBar');
  webBar.style.display = query.length > 0 ? 'flex' : 'none';

  if (!query) {
    renderWelcome();
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  const words = query.split(/\s+/).filter(w => w.length > 0);

  filteredResults = allTranslations
    .map(t => {
      const en = (t.en || '').toLowerCase();
      const es = (t.es || '').toLowerCase();

      let score = 0;
      let matches = false;

      for (const word of words) {
        const enMatch = en.includes(word);
        const esMatch = es.includes(word);

        if (langFilter === 'en' && !enMatch) return null;
        if (langFilter === 'es' && !esMatch) return null;
        if (langFilter === 'both' && !enMatch && !esMatch) return null;

        if (enMatch || esMatch) matches = true;

        if (en === query || es === query) score += 100;
        if (en.startsWith(query) || es.startsWith(query)) score += 50;
        if (enMatch) score += 10;
        if (esMatch) score += 10;
      }

      if (!matches) return null;
      if (typeFilter !== 'all' && t.type !== typeFilter) return null;
      if (sourceFilter !== 'all' && t.source !== sourceFilter) return null;

      const lenPenalty = Math.min(t.en.length + t.es.length, 500) / 500;
      score -= lenPenalty * 5;

      return { ...t, score };
    })
    .filter(Boolean);

  switch (sortFilter) {
    case 'relevance': filteredResults.sort((a, b) => b.score - a.score); break;
    case 'shortest': filteredResults.sort((a, b) => a.en.length - b.en.length); break;
    case 'longest': filteredResults.sort((a, b) => b.en.length - a.en.length); break;
    case 'alpha-en': filteredResults.sort((a, b) => a.en.localeCompare(b.en)); break;
    case 'alpha-es': filteredResults.sort((a, b) => a.es.localeCompare(b.es)); break;
  }

  renderResults(query);
}

function renderWelcome() {
  const sources = [...new Set(allTranslations.map(t => t.source || 'Unknown'))];
  const hasData = allTranslations.length > 0;
  document.getElementById('results').innerHTML = hasData ? `
    <div class="welcome-msg">
      <h2>Search your translation memory</h2>
      <p>Type a word or phrase in English or Spanish to find previous translations.
      Use the filters to narrow results by language, type, or source document.</p>
      <div class="sources-list" style="justify-content:center;margin-top:14px;">
        <span>Loaded sources:</span>
        ${sources.map(s => `<span class="source-tag">${escapeHtml(s)}</span>`).join('')}
      </div>
    </div>` : `
    <div class="welcome-msg">
      <h2>Welcome to Key Translations Dictionary</h2>
      <p>To get started, import your translation memory file using the
      <strong>Import Translations</strong> button above.</p>
      <p style="margin-top:10px;">Accepted format: a JSON file containing an array of objects
      with <code>"en"</code> and <code>"es"</code> fields.<br>
      Optional fields: <code>"source"</code> (document name) and <code>"type"</code> (paragraph, table_cell).</p>
    </div>`;
}

function renderResults(query) {
  const container = document.getElementById('results');
  const total = filteredResults.length;

  if (total === 0) {
    container.innerHTML = `
      <div class="no-results">
        <h3>No matches found</h3>
        <p>Try a different search term or use the web search buttons above to look it up online.</p>
      </div>`;
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  const totalPages = Math.ceil(total / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageItems = filteredResults.slice(start, start + PAGE_SIZE);

  container.innerHTML = pageItems.map(t => {
    const enHtml = highlightText(t.en, query);
    const esHtml = highlightText(t.es, query);
    const typeName = t.type === 'table_cell' ? 'Table' : 'Paragraph';
    return `
      <div class="result-card">
        <div class="lang-col">
          <div class="lang-label en"><span class="lang-flag flag-en"></span> English</div>
          <div class="lang-text">${enHtml}</div>
        </div>
        <div class="arrow-col">&harr;</div>
        <div class="lang-col">
          <div class="lang-label es"><span class="lang-flag flag-es"></span> Spanish</div>
          <div class="lang-text">${esHtml}</div>
        </div>
        <div class="meta-badges">
          <span class="badge badge-source">${escapeHtml(t.source || 'Unknown')}</span>
          <span class="badge badge-type">${typeName}</span>
        </div>
      </div>`;
  }).join('');

  const pagEl = document.getElementById('pagination');
  if (totalPages > 1) {
    pagEl.style.display = 'flex';
    pagEl.innerHTML = `
      <button ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">Previous</button>
      <span>Page ${currentPage} of ${totalPages} (${total} results)</span>
      <button ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next</button>`;
  } else {
    pagEl.style.display = 'none';
    const countLine = document.createElement('div');
    countLine.style.cssText = 'text-align:center;padding:8px;font-size:13px;color:#666;';
    countLine.textContent = `${total} result${total !== 1 ? 's' : ''}`;
    container.appendChild(countLine);
  }
}

function goPage(n) {
  currentPage = n;
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  renderResults(query);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function highlightText(text, query) {
  const safe = escapeHtml(text);
  if (!query) return safe;
  const words = query.split(/\s+/).filter(w => w.length > 0);
  let result = safe;
  for (const word of words) {
    const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const regex = new RegExp(`(${escaped})`, 'gi');
    result = result.replace(regex, '<mark>$1</mark>');
  }
  return result;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function webSearch(engine) {
  const query = document.getElementById('searchInput').value.trim();
  if (!query) return;
  const encoded = encodeURIComponent(query);
  const urls = {
    deepl: `https://www.deepl.com/translator#en/es/${encoded}`,
    google: `https://translate.google.com/?sl=en&tl=es&text=${encoded}`,
    linguee: `https://www.linguee.com/english-spanish/search?query=${encoded}`,
    reverso: `https://context.reverso.net/translation/english-spanish/${encoded}`,
    wordreference: `https://www.wordreference.com/es/translation.asp?tranword=${encoded}`
  };
  window.open(urls[engine], '_blank');
}

function showImportModal() {
  document.getElementById('importModal').classList.add('active');
}

function closeImportModal() {
  document.getElementById('importModal').classList.remove('active');
}

function handleFiles(files) {
  if (!files || !files.length) return;
  const file = files[0];
  if (!file.name.endsWith('.json')) {
    showToast('Please select a JSON file.', false);
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error('Expected an array');
      const valid = data.filter(d => d.en && d.es);
      if (!valid.length) throw new Error('No valid translation pairs found');

      valid.forEach(d => {
        if (!d.source) d.source = file.name.replace('.json', '');
        if (!d.type) d.type = 'imported';
      });

      const before = allTranslations.length;
      allTranslations = deduplicateTranslations([...allTranslations, ...valid]);
      const added = allTranslations.length - before;

      updateSourceFilter();
      updateStats();
      closeImportModal();
      showToast(`Imported ${added} new translation pairs from ${file.name}`, true);
      performSearch();
    } catch (err) {
      showToast('Error reading file: ' + err.message, false);
    }
  };
  reader.readAsText(file);
}

function exportData() {
  const data = filteredResults.length > 0 ? filteredResults.map(({score, ...rest}) => rest) : allTranslations;
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filteredResults.length > 0 ? 'key_translations_filtered.json' : 'key_translations_all.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Exported ${data.length} translations`, true);
}

function showToast(msg, success) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (success ? ' success' : '');
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('importModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeImportModal();
});

init();
</script>
